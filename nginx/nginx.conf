server {
    listen 80;
    server_name localhost;

    # Hide real server info, mimic IIS/ASP.NET
    server_tokens off;
    add_header X-AspNet-Version "4.0.30319" always;
    add_header X-Powered-By "ASP.NET" always;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Image CDN simulation (MinIO)
    location /image/ {
        proxy_pass http://minio:9000/covers/;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Powered-By "ASP.NET" always;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoints
    location ~ ^/(healthz|readyz)$ {
        proxy_pass http://backend:8000;
    }

    # Admin path (403 for realism)
    location /admin/ {
        return 403;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://backend:8000;
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://backend:8000;
    }

    # Everything else -> Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
